<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Favicon: o logo de CONTORNO (logo/sun-logo.svg), com o mesmo
       tratamento do apple-touch-icon do pacote de marca — fundo oliva com
       cantos arredondados.

       O fundo é o que faz o contorno funcionar em tamanho pequeno. A
       primeira versão deste ficheiro tinha fundo transparente, e aí um
       traço fino sobre a barra do browser desaparecia; a tentativa
       seguinte, de preencher a silhueta, resolvia a legibilidade mas
       perdia o desenho. Contorno + fundo mantém as duas coisas.

       Traço a 8 (a arte usa 4.2): a 32px — o tamanho a que os ecrãs retina
       desenham o favicon — dá 1.28px, uma linha nítida.

       Fundo fixo, sem prefers-color-scheme: contrasta com barras claras e
       escuras, logo não precisa de duas variantes que possam divergir. -->
  <rect width="200" height="200" rx="44" fill="#22251a"></rect>
  <g fill="none" stroke="#a8b57a" stroke-width="8" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 94.97 102.53 L 75.31 58.35 L 111.24 26.00 L 130.91 70.17 Z"></path>
    <path d="M 94.97 102.53 L 130.91 70.17 L 172.78 94.35 L 136.85 126.70 Z"></path>
    <path d="M 94.97 102.53 L 136.85 126.70 L 126.80 174.00 L 84.92 149.82 Z"></path>
    <path d="M 94.97 102.53 L 84.92 149.82 L 36.83 154.88 L 46.89 107.58 Z"></path>
    <path d="M 94.97 102.53 L 46.89 107.58 L 27.22 63.41 L 75.31 58.35 Z"></path>
  </g>
</svg>
